<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Proses Konvergensi Sedang Berjalan</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#002117",
                        "primary-fixed": "#b0f0d6",
                        "on-secondary-container": "#745c00",
                        "on-background": "#1a1c1a",
                        "tertiary-fixed-dim": "#adcfaf",
                        "primary": "#003527",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f2f1ee",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e9e8e5",
                        "on-secondary-fixed": "#241a00",
                        "on-secondary-fixed-variant": "#574500",
                        "on-surface": "#1a1c1a",
                        "on-primary-container": "#80bea6",
                        "secondary-fixed-dim": "#e9c349",
                        "inverse-primary": "#95d3ba",
                        "outline": "#707974",
                        "on-tertiary-fixed-variant": "#304d35",
                        "background": "#faf9f6",
                        "on-tertiary-container": "#99ba9b",
                        "surface-bright": "#faf9f6",
                        "outline-variant": "#bfc9c3",
                        "on-tertiary-fixed": "#03210c",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#0b513d",
                        "tertiary-fixed": "#c8ebca",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f312f",
                        "secondary": "#735c00",

                        "surface-container-highest": "#e3e2e0",

                        "on-tertiary": "#ffffff",

                        "secondary-fixed": "#ffe088",

                        "primary-fixed-dim": "#95d3ba"

                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1200px",
                        "gutter": "24px",
                        "unit": "4px",
                        "margin": "40px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-xl": ["Newsreader"],
                        "headline-md": ["Newsreader"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Newsreader"]

                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "300" }],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center overflow-hidden antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- The design suppresses the TopAppBar and BottomNavBar as this is a transitional/loading state screen -->
<main class="relative w-full h-screen flex flex-col items-center justify-center p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-bright via-background to-surface-container-low">
<!-- Visual Metaphor: Convergence Grid/Lines -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<!-- Central Trunk (Vertical) -->
<div class="absolute left-1/2 top-0 bottom-0 w-[1px] bg-gradient-to-b from-transparent via-primary to-transparent transform -translate-x-1/2"></div>
<!-- Convergence Axis (Horizontal) -->
<div class="absolute top-1/2 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent transform -translate-y-1/2"></div>
<!-- Faded branch lines simulating gathering data -->
<div class="absolute top-[20%] left-0 w-1/2 h-[1px] bg-gradient-to-r from-transparent to-primary/20 rotate-[15deg] transform origin-right"></div>
<div class="absolute top-[80%] left-0 w-1/2 h-[1px] bg-gradient-to-r from-transparent to-primary/20 -rotate-[15deg] transform origin-right"></div>
<div class="absolute top-[30%] right-0 w-1/2 h-[1px] bg-gradient-to-l from-transparent to-primary/20 -rotate-[10deg] transform origin-left"></div>
<div class="absolute top-[70%] right-0 w-1/2 h-[1px] bg-gradient-to-l from-transparent to-primary/20 rotate-[10deg] transform origin-left"></div>
</div>
<!-- Central Node Container (Glassmorphic) -->
<div class="relative z-10 w-full max-w-[600px] bg-white/80 backdrop-blur-[12px] border-[0.5px] border-outline-variant p-16 flex flex-col items-center justify-center shadow-[0_8px_32px_rgba(0,53,39,0.03)]">
<!-- Network Nodes (Corner Accents) -->
<div class="absolute -top-[2px] -left-[2px] w-[5px] h-[5px] bg-primary"></div>
<div class="absolute -top-[2px] -right-[2px] w-[5px] h-[5px] bg-primary"></div>
<div class="absolute -bottom-[2px] -left-[2px] w-[5px] h-[5px] bg-primary"></div>
<div class="absolute -bottom-[2px] -right-[2px] w-[5px] h-[5px] bg-primary"></div>
<!-- Central Intersection Dot -->
<div class="absolute top-0 left-1/2 w-[3px] h-[3px] bg-primary transform -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 left-1/2 w-[3px] h-[3px] bg-primary transform -translate-x-1/2 translate-y-1/2"></div>
<!-- Content -->
<div class="text-center space-y-6">
<!-- Icon element referencing the brand's convergence nature -->
<div class="text-primary/60 mb-8">
<span class="material-symbols-outlined text-[32px] font-light">all_inclusive</span>
</div>
<h1 class="font-display-xl text-display-xl text-primary m-0 px-4">Menenun Ringkasan...</h1>
<p class="font-label-sm text-label-sm text-outline tracking-[0.2em] uppercase m-0">
                    Proses Konvergensi Sedang Berjalan
                </p>
<!-- Static representation of the Gold Mist progress bar (Convergence indicator) -->
<div class="w-48 h-[2px] bg-surface-variant mx-auto mt-12 relative overflow-hidden flex">
<!-- The converging fill -->
<div class="h-full bg-secondary w-[60%] mx-auto"></div>
</div>
<!-- Micro-copy -->
<p class="font-body-md text-[13px] text-on-surface-variant/60 mt-4 italic font-serif">
                    Menyuling fragmen menjadi satu kebenaran.
                </p>
</div>
</div>
</main>
</body></html>
